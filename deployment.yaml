apiVersion: apps/v1
kind: Deployment
metadata:
  name: task22-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task22-app

  template:
    metadata:
      labels:
        app: task22-app

    spec:
      containers:
      - name: task22-app
        image: dhilshad/task22-app:13
        ports:
        - containerPort: 3000
